# Production override for VPS deployment.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file:
#   - Adds Nginx reverse proxy with SSL termination
#   - Adds Certbot for Let's Encrypt certificates
#   - Switches all services to production build targets
#   - Removes source code volume mounts (use built images)
#   - Adds restart policies
#   - Closes direct port exposure (all traffic goes through Nginx)

services:

  # === Nginx reverse proxy ===
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/certs:/etc/letsencrypt:ro
      - ./infrastructure/nginx/certbot-webroot:/var/www/certbot:ro
      - python_static:/var/www/static:ro
    depends_on:
      frontend:
        condition: service_started
        required: false
      api-python:
        condition: service_started
        required: false
    networks:
      - internal-net

  # === Certbot (SSL) ===
  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - ./infrastructure/nginx/certs:/etc/letsencrypt
      - ./infrastructure/nginx/certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # === Frontend — production build ===
  frontend:
    build:
      target: production
    restart: unless-stopped
    volumes: []   # remove dev volume mount
    environment:
      NODE_ENV: production

  # === Python API — production build (Gunicorn) ===
  api-python:
    build:
      target: production
    restart: unless-stopped
    ports: []     # close direct port; traffic goes through Nginx
    volumes:
      - python_static:/var/www/static  # collectstatic output
    environment:
      DJANGO_DEBUG: "0"

  # === Celery worker (only when ENABLE_RABBITMQ=1) ===
  api-python-worker:
    build:
      target: production
    restart: unless-stopped
    volumes: []

  # === Database ===
  database-postgres:
    restart: unless-stopped

  # === RabbitMQ ===
  rabbitmq:
    restart: unless-stopped
    ports: []   # close management UI in production

volumes:
  python_static:
